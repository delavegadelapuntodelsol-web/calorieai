<style>html,body{margin:0;background:#0E1014;}
#cai-key{position:fixed;left:12px;bottom:12px;z-index:999;background:#1F232C;color:#8A909C;border:1px solid #2A2F3A;border-radius:10px;padding:8px 12px;font:600 12px Inter,system-ui,sans-serif;cursor:pointer;}
#cai-key.unset{background:#38BDF8;color:#04161F;}</style>

<body>
<div id="root"></div>
<button id="cai-key" onclick="caiSetKey()">🔑 Clé API</button>
<script>
window.storage = {
  async get(k){ const v=localStorage.getItem('cai__'+k); return v==null?null:{key:k,value:v}; },
  async set(k,v){ localStorage.setItem('cai__'+k,String(v)); return {key:k,value:v}; },
  async delete(k){ localStorage.removeItem('cai__'+k); return {key:k,deleted:true}; },
  async list(p=''){ const keys=[]; for(let i=0;i<localStorage.length;i++){ const kk=localStorage.key(i); if(kk&&kk.indexOf('cai__')===0){ const b=kk.slice(5); if(b.indexOf(p)===0) keys.push(b); } } return {keys,prefix:p}; }
};</script>
<script>
function caiSetKey(){
  var cur = localStorage.getItem('cai_apikey')||'';
  var k = prompt('Colle ta clé API Anthropic (commence par sk-ant-...).\n\nElle reste UNIQUEMENT dans ce navigateur, sur cet appareil. Ne partage pas ce fichier une fois la clé saisie.', cur);
  if(k!==null){ localStorage.setItem('cai_apikey', k.trim()); caiRefreshKeyBtn(); }
}
function caiRefreshKeyBtn(){
  var b=document.getElementById('cai-key');
  if(!b) return;
  if(localStorage.getItem('cai_apikey')){ b.style.display='none'; }
  else { b.style.display='block'; b.classList.add('unset'); b.textContent='🔑 Ajouter ta clé API'; }
}
caiRefreshKeyBtn();
</script>
<script>const {useState,useEffect,useRef,useCallback}=React;
"use strict";
// ---------------------------------------------------------------------------
// CalorieAI — suivi calorique par photo + historique + déficit net (montre)
// ---------------------------------------------------------------------------
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
.cai-root {
  --bg:#0E1014; --panel:#181B22; --panel-2:#1F232C; --hair:#2A2F3A;
  --txt:#E8EAED; --muted:#8A909C; --green:#34D399; --amber:#F0883E; --cyan:#38BDF8; --red:#F87171;
  font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; -webkit-font-smoothing:antialiased;
}
.cai-wrap { max-width:520px; margin:0 auto; padding:20px 16px 120px; }
.cai-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; }
.cai-logo { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px; letter-spacing:-0.4px; }
.cai-logo span { color:var(--cyan); }
.cai-date { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.cai-gear { background:none; border:none; color:var(--muted); cursor:pointer; padding:6px; font-size:18px; line-height:1; transition:color .15s; }
.cai-gear:hover { color:var(--txt); }

.cai-tabs { display:flex; gap:6px; background:var(--panel); border:1px solid var(--hair); border-radius:12px; padding:4px; margin-bottom:18px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; }
.cai-tabs::-webkit-scrollbar { display:none; }
.cai-tab { flex:0 0 auto; background:none; border:none; color:var(--muted); font-family:'Inter',sans-serif; font-weight:600; font-size:13px; padding:9px 14px; border-radius:8px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.cai-tab.active { background:var(--panel-2); color:var(--txt); }

.cai-balance { background:var(--panel); border:1px solid var(--hair); border-radius:18px; padding:22px 22px 18px; position:relative; overflow:hidden; }
.cai-balance::before { content:''; position:absolute; inset:0; background:radial-gradient(120% 80% at 50% -20%, rgba(56,189,248,0.08), transparent 60%); pointer-events:none; }
.cai-bal-label { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.cai-bal-num { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:58px; line-height:1; letter-spacing:-2px; margin:4px 0 2px; font-variant-numeric:tabular-nums; }
.cai-bal-unit { font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--muted); margin-left:4px; }
.cai-bal-state { display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; margin-top:4px; }
.cai-dot { width:8px; height:8px; border-radius:50%; }
.cai-budget-line { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-top:10px; }
.cai-gauge { margin-top:12px; height:10px; border-radius:6px; background:var(--panel-2); overflow:hidden; }
.cai-gauge-fill { height:100%; border-radius:6px; transition:width .5s cubic-bezier(.4,0,.2,1), background .3s; }
.cai-gauge-meta { display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-top:8px; }

.cai-watch { display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--hair); border-radius:14px; padding:12px 14px; margin-top:12px; }
.cai-watch-ic { font-size:20px; }
.cai-watch-body { flex:1; }
.cai-watch-lab { font-size:13px; font-weight:600; }
.cai-watch-hint { font-size:11px; color:var(--muted); margin-top:1px; }
.cai-watch-input { width:84px; background:var(--panel-2); border:1px solid var(--hair); border-radius:9px; padding:9px; color:var(--txt); font-family:'JetBrains Mono',monospace; font-size:15px; text-align:right; }
.cai-watch-input:focus { outline:none; border-color:var(--cyan); }

.cai-macros { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.cai-macro { background:var(--panel); border:1px solid var(--hair); border-radius:12px; padding:12px; }
.cai-macro-val { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:20px; font-variant-numeric:tabular-nums; }
.cai-macro-lab { font-size:11px; color:var(--muted); margin-top:2px; letter-spacing:.3px; }

.cai-actions { display:flex; gap:10px; margin:18px 0 8px; }
.cai-btn { flex:1; border:none; border-radius:14px; padding:15px; font-family:'Inter',sans-serif; font-weight:600; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .1s, filter .15s; }
.cai-btn:active { transform:scale(.98); }
.cai-btn-primary { background:var(--cyan); color:#04161F; }
.cai-btn-primary:hover { filter:brightness(1.08); }
.cai-btn-ghost { background:var(--panel); color:var(--txt); border:1px solid var(--hair); }
.cai-btn-ghost:hover { background:var(--panel-2); }
.cai-btn:disabled { opacity:.5; cursor:not-allowed; }

.cai-sec { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin:22px 2px 10px; }
.cai-entry { background:var(--panel); border:1px solid var(--hair); border-radius:14px; padding:14px; margin-bottom:10px; display:flex; gap:12px; align-items:flex-start; }
.cai-thumb { width:52px; height:52px; border-radius:10px; object-fit:cover; flex-shrink:0; background:var(--panel-2); }
.cai-thumb-ph { display:flex; align-items:center; justify-content:center; font-size:22px; }
.cai-entry-body { flex:1; min-width:0; }
.cai-entry-name { font-weight:600; font-size:15px; }
.cai-entry-q { font-size:12px; color:var(--muted); margin-top:1px; }
.cai-entry-macros { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-top:6px; }
.cai-entry-kcal { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:17px; font-variant-numeric:tabular-nums; white-space:nowrap; }
.cai-entry-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:2px 4px; line-height:1; }
.cai-entry-del:hover { color:var(--red); }
.cai-conf { display:inline-block; font-size:10px; font-family:'JetBrains Mono',monospace; padding:1px 6px; border-radius:5px; margin-left:6px; vertical-align:middle; }
.cai-empty { text-align:center; color:var(--muted); padding:30px 20px; font-size:14px; line-height:1.5; }

.cai-preview { background:var(--panel); border:1px solid var(--hair); border-radius:14px; padding:14px; margin-bottom:10px; }
.cai-preview img { width:100%; max-height:220px; object-fit:cover; border-radius:10px; }
.cai-analyzing { display:flex; align-items:center; gap:10px; color:var(--cyan); font-size:13px; font-weight:600; margin-top:12px; }
.cai-spin { width:16px; height:16px; border:2px solid var(--hair); border-top-color:var(--cyan); border-radius:50%; animation:cai-rot .7s linear infinite; }
@keyframes cai-rot { to { transform:rotate(360deg); } }
.cai-err { color:var(--red); font-size:13px; margin-top:10px; }

/* History */
.cai-chart-card { background:var(--panel); border:1px solid var(--hair); border-radius:18px; padding:18px 14px 12px; }
.cai-chart-head { display:flex; justify-content:space-between; align-items:baseline; padding:0 4px; margin-bottom:6px; }
.cai-chart-title { font-size:13px; font-weight:600; }
.cai-chart-big { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:24px; font-variant-numeric:tabular-nums; }
.cai-hrow { display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--hair); border-radius:13px; padding:12px 14px; margin-bottom:8px; }
.cai-hrow-date { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); width:62px; flex-shrink:0; }
.cai-hrow-bar { flex:1; height:6px; border-radius:4px; background:var(--panel-2); overflow:hidden; }
.cai-hrow-fill { height:100%; border-radius:4px; }
.cai-hrow-val { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; font-variant-numeric:tabular-nums; width:74px; text-align:right; flex-shrink:0; }
.cai-hrow-sub { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); }

.cai-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
.cai-modal { background:var(--panel); border:1px solid var(--hair); border-radius:20px 20px 0 0; width:100%; max-width:520px; padding:22px 20px 28px; max-height:88vh; overflow-y:auto; }
.cai-modal-title { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px; margin-bottom:16px; }
.cai-field { margin-bottom:14px; }
.cai-field label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; letter-spacing:.3px; }
.cai-input, .cai-select { width:100%; background:var(--panel-2); border:1px solid var(--hair); border-radius:10px; padding:12px; color:var(--txt); font-family:'Inter',sans-serif; font-size:15px; }
.cai-input:focus, .cai-select:focus { outline:none; border-color:var(--cyan); }
.cai-row { display:flex; gap:10px; } .cai-row > * { flex:1; }
.cai-calc { background:var(--panel-2); border-radius:12px; padding:14px; margin:6px 0 16px; }
.cai-calc-res { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--green); margin-top:10px; }
.cai-modal-btn { width:100%; background:var(--cyan); color:#04161F; border:none; border-radius:12px; padding:15px; font-weight:600; font-size:15px; cursor:pointer; margin-top:6px; }
.cai-modal-close { width:100%; background:none; border:none; color:var(--muted); padding:12px; cursor:pointer; font-size:14px; }
.cai-hint { font-size:12px; color:var(--muted); line-height:1.5; margin-top:4px; }

/* Tips accordion */
.cai-tip { background:var(--panel); border:1px solid var(--hair); border-radius:14px; margin-bottom:10px; overflow:hidden; }
.cai-tip-head { width:100%; background:none; border:none; color:var(--txt); text-align:left; padding:15px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; font-family:'Inter',sans-serif; }
.cai-tip-ic { font-size:18px; flex-shrink:0; }
.cai-tip-title { flex:1; font-weight:600; font-size:14px; }
.cai-tip-chev { color:var(--muted); font-size:13px; transition:transform .2s; }
.cai-tip.open .cai-tip-chev { transform:rotate(90deg); }
.cai-tip-body { padding:0 16px 16px; font-size:13.5px; line-height:1.6; color:#C7CBD4; }
.cai-tip-body p { margin-bottom:9px; }
.cai-tip-body strong { color:var(--txt); font-weight:600; }
.cai-tip-body .k { color:var(--cyan); font-family:'JetBrains Mono',monospace; font-size:12.5px; }
.cai-tip-body ul { list-style:none; }
.cai-tip-body li { padding-left:16px; position:relative; margin-bottom:7px; }
.cai-tip-body li::before { content:'·'; position:absolute; left:4px; color:var(--green); font-weight:700; }
.cai-disclaimer { font-size:11.5px; color:var(--muted); line-height:1.5; padding:14px 4px 0; text-align:center; }

/* Recents chips */
.cai-recents { display:flex; gap:8px; overflow-x:auto; padding:4px 0 2px; margin-top:4px; scrollbar-width:none; }
.cai-recents::-webkit-scrollbar { display:none; }
.cai-chip { flex:0 0 auto; background:var(--panel); border:1px solid var(--hair); color:var(--txt); border-radius:20px; padding:8px 14px; font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; font-family:'Inter',sans-serif; }
.cai-chip:hover { background:var(--panel-2); }
.cai-chip-copy { background:var(--panel-2); color:var(--cyan); font-weight:600; }

/* Bottom navigation */
.cai-bottomnav { position:fixed; left:0; right:0; bottom:0; z-index:40; display:flex; background:rgba(20,23,29,0.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-top:1px solid var(--hair); padding:7px 2px calc(7px + env(safe-area-inset-bottom)); }
.cai-navitem { flex:1; background:none; border:none; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:3px; padding:3px 0; cursor:pointer; font-family:'Inter',sans-serif; font-size:10px; font-weight:600; transition:color .15s; }
.cai-navitem.active { color:var(--cyan); }
.cai-navitem svg { transition:transform .15s; }
.cai-navitem.active svg { transform:translateY(-1px); }

/* Skeleton loaders */
.cai-skel { background:linear-gradient(90deg, var(--panel) 25%, var(--panel-2) 37%, var(--panel) 63%); background-size:400% 100%; animation:cai-shimmer 1.4s ease infinite; border-radius:14px; }
@keyframes cai-shimmer { 0% { background-position:100% 0; } 100% { background-position:-100% 0; } }

/* Backup reminder */
.cai-backup-banner { display:flex; align-items:center; gap:10px; background:rgba(240,136,62,0.12); border:1px solid rgba(240,136,62,0.4); color:var(--amber); border-radius:12px; padding:10px 12px; margin-bottom:12px; font-size:13px; }
.cai-backup-save { background:var(--amber); color:#1A1206; border:none; border-radius:8px; padding:7px 12px; font-weight:700; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; white-space:nowrap; }
.cai-backup-later { background:none; border:none; color:var(--amber); font-size:15px; cursor:pointer; padding:2px 4px; opacity:.7; }

/* Scanner */
.cai-scanbox { position:relative; border-radius:14px; overflow:hidden; background:#000; margin-bottom:10px; border:1px solid var(--hair); }
.cai-scanline { position:absolute; left:8%; right:8%; top:50%; height:2px; background:var(--red); box-shadow:0 0 8px var(--red); animation:cai-scan 1.8s ease-in-out infinite; }
@keyframes cai-scan { 0%,100% { top:25%; } 50% { top:75%; } }

/* Coach card */
.cai-coach { background:linear-gradient(150deg, #1A2230, #181B22); border:1px solid var(--hair); border-radius:16px; padding:16px; margin-top:12px; }
.cai-coach-top { display:flex; align-items:center; gap:10px; }
.cai-coach-ic { width:30px; height:30px; border-radius:9px; background:rgba(56,189,248,.15); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.cai-coach-title { font-weight:600; font-size:14px; flex:1; }
.cai-coach-btn { background:var(--cyan); color:#04161F; border:none; border-radius:9px; padding:8px 14px; font-weight:600; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; }
.cai-coach-btn:disabled { opacity:.5; cursor:not-allowed; }
.cai-coach-text { font-size:13.5px; line-height:1.6; color:#D5D9E0; margin-top:12px; white-space:pre-wrap; }
